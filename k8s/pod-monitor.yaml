apiVersion: [monitoring.coreos.com/v1](https://monitoring.coreos.com/v1)
kind: PodMonitor
metadata:
  name: video-app-pod-monitor
  namespace: monitoring
  labels:
    release: monitoramento
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      app: minha-app-pedidos
  podMetricsEndpoints:
    - targetPort: 8080
      path: /actuator/prometheus
      interval: 15s